<!DOCTYPE html>
<html>
<head>
    <title>AI Content Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>AI Content Generator</h1>

    <form method="POST" action="/generate">

        <label>Content Type</label>
        <select name="content_type">
            <option>LinkedIn Post</option>
            <option>Email</option>
            <option>Advertisement</option>
        </select>

        <label>Tone</label>
        <select name="tone">
            <option>Professional</option>
            <option>Casual</option>
            <option>Persuasive</option>
            <option>Friendly</option>
        </select>

        <label>Target Audience</label>
        <input type="text" name="audience" placeholder="e.g., College Students" required>

        <label>Content Length</label>
        <select name="length">
            <option>Short</option>
            <option>Medium</option>
            <option>Long</option>
        </select>

        <label>Keywords</label>
        <input type="text" name="keywords" placeholder="AI, automation, marketing">

        <button type="submit">Generate Content</button>

    </form>

    {% if generated_content %}
    <div class="output-section">
        <h2>Generated Output</h2>

        <p><strong>Headline:</strong> {{ generated_content.headline }}</p>

        <p><strong>Two Lines:</strong><br>
            {{ generated_content.two_lines | replace('\n', '<br>') | safe }}
        </p>

        <p><strong>CTA:</strong> {{ generated_content.cta }}</p>

        <p>
            {{ generated_content.body | replace('\n', '<br>') | safe }}
        </p>
    </div>
    {% endif %}

</div>

</body>
</html>
